name: Build OpenClaw Dist

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-dist:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    
    steps:
      - name: Checkout cloud-claw repo
        uses: actions/checkout@v4
      
      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Install pnpm
        run: corepack enable && corepack prepare pnpm@10.28.2 --activate
      
      - name: Clone OpenClaw (main repo)
        run: |
          git clone --depth 1 https://github.com/openclaw/openclaw.git openclaw-dist
      
      - name: Configure pnpm
        working-directory: openclaw-dist
        run: |
          pnpm config set package-import-method copy
          pnpm config set virtual-store-dir ./node_modules/.pnpm
      
      - name: Install dependencies
        working-directory: openclaw-dist
        run: pnpm install --frozen-lockfile
        timeout-minutes: 30
      
      - name: Build (ciArtifacts profile - minimal)
        working-directory: openclaw-dist
        run: NODE_OPTIONS=--max-old-space-size=6144 pnpm build ciArtifacts
        timeout-minutes: 120
      
      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-dist
          path: openclaw-dist/dist/
          retention-days: 7
